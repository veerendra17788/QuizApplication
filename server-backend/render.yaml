services:
  - type: web
    name: million-quest-api
    env: node
    rootDir: server-backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromConfig: true
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromConfig: true
